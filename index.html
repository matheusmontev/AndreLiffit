<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SaaS</title>
    <style>
        /* 
         * DESIGN (CSS)
         * Estilo moderno, clean e minimalista.
         */

        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        /* Centralização na tela usando Flexbox e vh */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            /* Fundo suave e moderno */
            color: #333;
        }

        /* Card de Login */
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        /* Logo / Imagem de Perfil */
        .logo-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            /* Circular */
            margin-bottom: 1.5rem;
            border: 3px solid #e2e8f0;
        }

        /* Título (Opcional, para contexto) */
        h2 {
            margin-bottom: 1.5rem;
            font-weight: 600;
            color: #1a202c;
        }

        /* Grupo de Inputs */
        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #4a5568;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }

        /* Botão de Ação */
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background-color: #4299e1;
            /* Azul moderno */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background-color: #3182ce;
        }

        /* Mensagem de Erro */
        .error-message {
            color: #e53e3e;
            /* Vermelho */
            font-size: 0.9rem;
            margin-top: 1rem;
            min-height: 1.2em;
            /* Reserva espaço para não pular layout */
            opacity: 0;
            transition: opacity 0.3s;
        }


        /* Painel Admin */
        .admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 600px;
            z-index: 1000;
            max-height: 80vh;
            overflow-y: auto;
        }

        .admin-panel.visible {
            display: block;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        .admin-table th, .admin-table td {
            padding: 0.75rem;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
            font-size: 0.9rem;
        }

        .btn-admin-close {
            background: #e2e8f0;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-add {
            background: #48bb78;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .btn-remove {
            background: #f56565;
            color: white;
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-export {
            background: #4a5568;
            color: white;
            border: none;
            padding: 0.85rem;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .export-area {
            margin-top: 1rem;
            display: none;
        }

        .export-area textarea {
            width: 100%;
            height: 150px;
            font-family: monospace;
            font-size: 0.8rem;
            padding: 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        /* Botão discreto para admin */
        .admin-trigger {
            position: fixed;
            bottom: 10px;
            right: 10px;
            opacity: 0.1;
            cursor: default;
            font-size: 0.7rem;
        }

        .admin-trigger:hover {
            opacity: 1;
            cursor: pointer;
        }
        .admin-link {
            position: fixed;
            bottom: 15px;
            right: 15px;
            opacity: 0.1;
            color: #333;
            text-decoration: none;
            font-size: 1.2rem;
            transition: opacity 0.3s;
        }

        .admin-link:hover {
            opacity: 0.8;
        }
    </style>
    <script src="js/usuarios.js"></script>
</head>

<body>

    <div class="login-card">
        <!-- Logo centralizada -->
        <img src="imagem/WhatsApp Image 2026-01-11 at 22.06.32.jpeg" alt="Logo do SaaS" class="logo-img">

        <h2>Bem-vindo</h2>

        <form id="loginForm">
            <div class="input-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" placeholder="Digite seu usuário" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>


        <div id="msgErro" class="error-message">Usuário ou senha incorretos.</div>

        <div class="admin-trigger" onclick="toggleAdmin()">Config</div>
    </div>

    <!-- Painel de Gerenciamento -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h3>Gerenciar Usuários</h3>
            <button class="btn-admin-close" onclick="toggleAdmin()">Fechar</button>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>Usuário</th>
                    <th>Senha</th>
                    <th>Link</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <!-- Preenchido via JS -->
            </tbody>
        </table>

        <h4>Adicionar Novo</h4>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;">
            <input type="text" id="newUsername" placeholder="Usuário" class="input-group input" style="padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
            <input type="text" id="newPassword" placeholder="Senha" class="input-group input" style="padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <input type="text" id="newLink" placeholder="Link de Redirecionamento" class="input-group input" style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 1rem;">
        <button class="btn-add" onclick="addUser()">+ Adicionar Usuário</button>

        <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid #eee;">

        <button class="btn-export" onclick="exportCode()">💾 Gerar Código para Salvar</button>
        
        <div id="exportArea" class="export-area">
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 0.5rem;">Copia o código abaixo e cola dentro do arquivo <strong>js/usuarios.js</strong>:</p>
            <textarea id="exportTextarea" readonly></textarea>
            <button class="btn-login" onclick="copyCode()" style="background: #2d3748;">Copiar Código</button>
        </div>
    </div>

    <script src="js/usuarios.js"></script>
    <script>
        /**
         * LÓGICA (JavaScript)
         * Requisito Principal: Sistema com MÚLTIPLOS USUÁRIOS.
         */

        // =================================================================
        // LISTA DE USUÁRIOS - ADICIONE OU REMOVA USUÁRIOS AQUI
        // =================================================================
        // Cada objeto deve ter: { usuario: "...", senha: "...", link_de_redirecionamento: "..." }
        const LISTA_DE_USUARIOS = [
            {
                usuario: "admin",
                senha: "123",
                link_de_redirecionamento: "https://google.com" // Exemplo: Dashboard Admin
            },
            {
                usuario: "ELOISA",
                senha: "131427",
                link_de_redirecionamento: "https://andreliffit.my.canva.site/andre" // Exemplo: Área do Cliente
            },
            {
                usuario: "visitante",
                senha: "000",
                link_de_redirecionamento: "https://example.com" // Exemplo: Página de Boas-vindas
            },
            {
                usuario: "matheus",
                senha: "123",
                link_de_redirecionamento: "https://www.instagram.com/matheusmontev/" // Exemplo: Dashboard Admin
            },
            // Adicione novos usuários copiando o bloco acima e colando aqui
        ];
        // =================================================================

        const loginForm = document.getElementById('loginForm');
        const msgErro = document.getElementById('msgErro');

        loginForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const usuarioInput = document.getElementById('usuario').value.trim();
            const senhaInput = document.getElementById('senha').value.trim();

            let usuarioEncontrado = false;

            // Varre a lista de usuários carregada do js/usuarios.js
            for (let i = 0; i < LISTA_DE_USUARIOS.length; i++) {
                const u = LISTA_DE_USUARIOS[i];

                if (u.usuario === usuarioInput && u.senha === senhaInput) {
                    usuarioEncontrado = true;
                    console.log(`Login com sucesso! Redirecionando ${u.usuario} para ${u.link_de_redirecionamento}`);
                    window.location.href = u.link_de_redirecionamento;
                    break;
                }
            }

            if (!usuarioEncontrado) {
                msgErro.classList.add('visible');
                document.getElementById('senha').value = '';
                document.getElementById('senha').focus();
            } else {
                msgErro.classList.remove('visible');
            }
        });


        // Limpa erro ao digitar novamente
        document.getElementById('usuario').addEventListener('input', () => msgErro.classList.remove('visible'));
        document.getElementById('senha').addEventListener('input', () => msgErro.classList.remove('visible'));

        // FUNÇÕES ADMIN
        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('visible');
            if (panel.classList.contains('visible')) {
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            LISTA_DE_USUARIOS.forEach((u, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${u.usuario}</td>
                    <td>${u.senha}</td>
                    <td title="${u.link_de_redirecionamento}">${u.link_de_redirecionamento.substring(0, 20)}...</td>
                    <td><button class="btn-remove" onclick="removeUser(${index})">X</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function addUser() {
            const user = document.getElementById('newUsername').value.trim();
            const pass = document.getElementById('newPassword').value.trim();
            const link = document.getElementById('newLink').value.trim();

            if (user && pass && link) {
                LISTA_DE_USUARIOS.push({
                    usuario: user,
                    senha: pass,
                    link_de_redirecionamento: link
                });
                renderTable();
                // Limpa campos
                document.getElementById('newUsername').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('newLink').value = '';
            } else {
                alert('Preencha todos os campos!');
            }
        }

        function removeUser(index) {
            if (confirm('Tem certeza que deseja remover este usuário?')) {
                LISTA_DE_USUARIOS.splice(index, 1);
                renderTable();
            }
        }

        function exportCode() {
            const area = document.getElementById('exportArea');
            const textarea = document.getElementById('exportTextarea');
            
            const code = `/**
 * LISTA DE USUÁRIOS - Gerado automaticamente
 */
const LISTA_DE_USUARIOS = ${JSON.stringify(LISTA_DE_USUARIOS, null, 4)};`;
            
            textarea.value = code;
            area.style.display = 'block';
            textarea.scrollIntoView({ behavior: 'smooth' });
        }

        function copyCode() {
            const textarea = document.getElementById('exportTextarea');
            textarea.select();
            document.execCommand('copy');
            alert('Código copiado! Agora cole no arquivo js/usuarios.js e salve.');
        }

    </script>
    <a href="admin.html" class="admin-link" title="Painel de Gerenciamento">⚙️</a>
</body>

</html>
